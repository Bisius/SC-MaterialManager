<section class="panel p-6 max-w-3xl">
  <div class="flex items-center gap-2 mb-5">
    <span class="text-cyan-500 text-xs tracking-widest uppercase">// New Entry</span>
    <div class="flex-1 h-px bg-cyan-900"></div>
  </div>
  <form [formGroup]="form" (ngSubmit)="onAdd()" class="grid grid-cols-1 sm:grid-cols-2 gap-5">

    <!-- Material -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] tracking-[0.2em] uppercase text-cyan-600">// Material</label>
      <select formControlName="material" class="sci-input">
        <option value="" disabled>-- SELECT MATERIAL --</option>
        @for (m of materials; track m.short) {
          <option [value]="m.short">{{ m.name }}</option>
        }
      </select>
      @if (materialCtrl.invalid && materialCtrl.touched) {
        <span class="text-red-400 text-[10px] tracking-widest uppercase">! REQUIRED</span>
      }
    </div>

    <!-- Quality -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] tracking-[0.2em] uppercase text-cyan-600">// Quality [ 0 - 1000 ]</label>
      <input type="number" formControlName="quality" min="0" max="1000" placeholder="0 - 1000"
        class="sci-input" />
      @if (qualityCtrl.invalid && qualityCtrl.touched) {
        <span class="text-red-400 text-[10px] tracking-widest uppercase">! VALUE 0 - 1000</span>
      }
    </div>

    <!-- Quantity -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] tracking-[0.2em] uppercase text-cyan-600">// Quantity [ cSCU ]</label>
      <input type="number" formControlName="quantity" min="0" placeholder="cSCU"
        class="sci-input" />
      @if (quantityCtrl.invalid && quantityCtrl.touched) {
        <span class="text-red-400 text-[10px] tracking-widest uppercase">! POSITIVE VALUE REQUIRED</span>
      }
    </div>

    <!-- Location -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] tracking-[0.2em] uppercase text-cyan-600">// Storage Location</label>
      <select formControlName="location" class="sci-input">
        <option value="" disabled>-- SELECT LOCATION --</option>
        @if (filter.activeStationCount() > 0) {
          <option value="" disabled class="text-cyan-700">-- {{ filter.activeStationCount() }} ACTIVE STATIONS --</option>
        }
        @for (sys of filter.filteredSystems(); track sys) {
          <optgroup [label]="'[ ' + sys + ' ]'">
            @for (loc of filter.filteredLocationsBySystem(sys); track loc.name) {
              <option [value]="loc.name">{{ loc.name }}</option>
            }
          </optgroup>
        }
      </select>
      @if (locationCtrl.invalid && locationCtrl.touched) {
        <span class="text-red-400 text-[10px] tracking-widest uppercase">! REQUIRED</span>
      }
    </div>

    <!-- Submit -->
    <div class="sm:col-span-2 flex items-center justify-between pt-2">
      <label class="flex items-center gap-2 cursor-pointer group" (click)="goToManifest.update(v => !v)">
        <span class="w-3.5 h-3.5 border flex items-center justify-center shrink-0 transition-colors"
          [class]="goToManifest() ? 'border-cyan-400 bg-cyan-400 glow-cyan-sm' : 'border-cyan-800 group-hover:border-cyan-600'">
          @if (goToManifest()) {
            <span class="material-icons text-[10px] text-cyan-900 leading-none">check</span>
          }
        </span>
        <span class="text-[10px] tracking-widest uppercase"
          [class]="goToManifest() ? 'text-cyan-400' : 'text-cyan-700 group-hover:text-cyan-500'">
          Show manifest after adding
        </span>
      </label>
      <button type="submit"
        class="px-8 py-2.5 text-xs font-bold tracking-[0.2em] uppercase text-cyan-300 border border-cyan-500 bg-[#040c18] hover:bg-cyan-950 hover:text-white glow-cyan transition-all cursor-pointer"
        style="clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%)">
        &gt;&gt; SUBMIT RECORD
      </button>
    </div>

  </form>
</section>
