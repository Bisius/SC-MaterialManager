<div class="min-h-screen text-slate-100 p-6 font-mono">

  <!-- Header -->
  <header class="mb-8 border-b border-cyan-900 pb-4">
    <div class="flex items-center gap-3 mb-1">
      <span class="inline-block w-2 h-6 bg-cyan-400 glow-cyan-sm"></span>
      <h1 class="text-2xl font-bold tracking-[0.2em] uppercase text-cyan-300 glow-cyan-sm"
          style="text-shadow:0 0 12px rgba(0,229,255,.6)">
        SC Material Manager
      </h1>
    </div>
    <p class="text-xs tracking-widest text-cyan-800 uppercase ml-5">// Mining cargo tracking system v1.0</p>
  </header>

  <!-- Tab Bar -->
  <nav class="flex gap-0 mb-6">
    <button (click)="activeTab = 'stations'"
      [class]="activeTab === 'stations' ? 'hud-tab hud-tab-active' : 'hud-tab hud-tab-inactive'">
      [ STATIONS ]
      @if (activeStationCount > 0) {
        <span class="ml-1 text-cyan-400 glow-cyan-sm">{{ activeStationCount }}</span>
      }
    </button>
    <button (click)="activeTab = 'add'"
      [class]="activeTab === 'add' ? 'hud-tab hud-tab-active' : 'hud-tab hud-tab-inactive'">
      [ ADD MATERIAL ]
    </button>
    <button (click)="activeTab = 'list'"
      [class]="activeTab === 'list' ? 'hud-tab hud-tab-active' : 'hud-tab hud-tab-inactive'">
      [ CARGO MANIFEST ]
      @if (recordCount > 0) {
        <span class="ml-1 text-cyan-400 glow-cyan-sm">{{ recordCount }}</span>
      }
    </button>
    <div class="flex-1 border-b border-cyan-500"></div>
  </nav>

  <!-- Tab content -->
  @if (activeTab === 'stations') {
    <app-stations />
  }
  @if (activeTab === 'add') {
    <app-add-material (recorded)="onRecorded($event)" />
  }
  @if (activeTab === 'list') {
    <app-cargo-manifest />
  }

</div>
