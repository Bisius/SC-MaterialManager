<div class="min-h-screen text-hud-body p-6 font-mono">

  <!-- Header -->
  <header class="mb-8 border-b border-hud-dim pb-4">
    <div class="flex items-center gap-3 mb-1">
      <span class="inline-block w-2 h-6 bg-hud-accent glow-cyan-sm"></span>
      <h1 class="text-2xl font-bold tracking-[0.2em] uppercase text-hud-primary glow-cyan-sm"
          style="text-shadow:0 0 12px rgba(0,229,255,.6)">
        SC Material Manager
      </h1>
    </div>
    <p class="text-xs tracking-widest text-hud-ghost uppercase ml-5">// Crafting materials tracking system v1.0</p>
  </header>

  <!-- Cargo Manifest (always visible) -->
  <app-cargo-manifest
    (openStations)="showStationsModal = true"
    (openAddLocation)="showAddLocationModal = true"
    (openAddMaterial)="showAddModal = true" />

  <!-- Footer -->
  <footer class="mt-10 border-t border-hud-dim pt-4 flex items-center justify-start gap-6">
    <a href="https://github.com/Bisius/SC-MaterialManager/issues"
       target="_blank"
       rel="noopener noreferrer"
       class="text-xs tracking-widest uppercase text-hud-ghost hover:text-hud-accent transition-colors">
      // report an issue
    </a>
    <button (click)="showChangelogModal = true"
            class="text-xs tracking-widest uppercase text-hud-ghost hover:text-hud-accent transition-colors cursor-pointer">
      // changelog
    </button>
  </footer>

  <!-- Modals -->
  <app-changelog-modal [open]="showChangelogModal" [changelog]="changelog" (close)="showChangelogModal = false" />
  <app-stations-modal [open]="showStationsModal" (close)="showStationsModal = false" />
  <app-add-location-modal [open]="showAddLocationModal" (close)="showAddLocationModal = false" />
  <app-add-material-modal [open]="showAddModal" (close)="showAddModal = false" (recorded)="onRecorded($event)" />

</div>
