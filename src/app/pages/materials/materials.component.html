<div class="min-h-screen text-hud-body p-6 font-mono">

  <!-- Header -->
  <header class="mb-8 border-b border-hud-dim pb-4">
    <div class="flex items-start justify-between gap-4">
      <div>
        <div class="flex items-center gap-3 mb-1">
          <span class="inline-block w-2 h-6 bg-hud-accent glow-cyan-sm"></span>
          <h1 class="text-2xl font-bold tracking-[0.2em] uppercase text-hud-primary glow-cyan-sm"
              style="text-shadow:0 0 12px rgba(0,229,255,.6)">
            SC Material Manager
          </h1>
        </div>
        <p class="text-xs tracking-widest text-hud-ghost uppercase ml-5">// Crafting materials tracking system v1.0</p>
      </div>
      <!-- Action buttons -->
      <div class="flex items-center gap-2 pt-1 shrink-0">
        <button (click)="showStationsModal = true" class="hud-toolbar-btn">
          [ STATIONS ]
          @if (activeStationCount > 0) {
            <span class="ml-1 text-hud-accent glow-cyan-sm">{{ activeStationCount }}</span>
          }
        </button>
        <button (click)="showAddModal = true" class="hud-toolbar-btn">
          [ ADD MATERIAL ]
        </button>
      </div>
    </div>
  </header>

  <!-- Cargo Manifest (always visible) -->
  <app-cargo-manifest />

  <!-- Stations Modal -->
  @if (showStationsModal) {
    <div class="fixed inset-0 bg-black/70 z-40 flex items-start justify-center py-16 overflow-y-auto px-4"
         (click)="showStationsModal = false">
      <div class="relative w-full max-w-4xl" (click)="$event.stopPropagation()">
        <div class="panel p-0">
          <div class="flex items-center justify-between border-b border-hud-dim px-5 py-3">
            <span class="text-xs tracking-widest uppercase text-hud-accent">// Select Active Stations</span>
            <button (click)="showStationsModal = false" class="hud-btn-ghost text-base leading-none px-2 py-0.5">✕</button>
          </div>
          <div class="p-5">
            <app-stations />
          </div>
        </div>
      </div>
    </div>
  }

  <!-- Add Material Modal -->
  @if (showAddModal) {
    <div class="fixed inset-0 bg-black/70 z-40 flex items-start justify-center py-16 overflow-y-auto px-4"
         (click)="showAddModal = false">
      <div class="relative w-full max-w-3xl" (click)="$event.stopPropagation()">
        <button (click)="showAddModal = false"
                class="absolute top-3 right-3 z-10 hud-btn-ghost text-base leading-none px-2 py-0.5">✕</button>
        <app-add-material (recorded)="onRecorded($event)" />
      </div>
    </div>
  }

</div>
