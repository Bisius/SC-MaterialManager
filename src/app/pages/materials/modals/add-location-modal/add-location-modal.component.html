@if (open) {
  <div class="fixed inset-0 bg-black/70 z-40 flex items-start justify-center py-16 overflow-y-auto px-4"
       (click)="close.emit()">
    <div class="relative w-full max-w-2xl" (click)="$event.stopPropagation()">
      <button (click)="close.emit()"
              class="absolute top-3 right-3 z-10 hud-btn-ghost text-base leading-none px-2 py-0.5">✕</button>
      <div class="panel p-0">
        <div class="flex items-center justify-between border-b border-hud-dim px-5 py-3">
          <span class="text-xs tracking-widest uppercase text-hud-accent">// Add Custom Location</span>
        </div>
        <div class="p-5 space-y-6">

          <!-- Add form -->
          <form (ngSubmit)="submit()" #f="ngForm" class="space-y-3">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 items-end">

              <!-- Name -->
              <div class="flex flex-col gap-1.5">
                <label class="hud-label">// Name</label>
                <input
                  class="sci-input"
                  type="text"
                  placeholder="e.g. Ship Name"
                  [(ngModel)]="name"
                  name="locName"
                  (input)="nameError.set('')"
                />
              </div>

              <!-- Refinery -->
              <div class="flex flex-col gap-1.5">
                <label class="hud-label">// Refinery</label>
                <label class="flex items-center gap-2 cursor-pointer group" (click)="refinery = !refinery">
                  <span class="w-3.5 h-3.5 border flex items-center justify-center shrink-0 transition-colors"
                        [class]="refinery ? 'border-hud-accent bg-hud-accent glow-cyan-sm' : 'border-hud-ghost group-hover:border-hud-secondary'">
                    @if (refinery) {
                      <svg viewBox="0 0 10 10" class="w-2.5 h-2.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5,5 4,7.5 8.5,2"/></svg>
                    }
                  </span>
                  <span class="text-xs tracking-widest uppercase"
                        [class]="refinery ? 'text-hud-accent' : 'text-hud-muted group-hover:text-hud-mid'">
                    Has refinery
                  </span>
                </label>
              </div>
            </div>

            @if (nameError()) {
              <p class="text-xs text-hud-error">{{ nameError() }}</p>
            }

            <button type="submit" class="hud-toolbar-btn text-xs">[ + ADD ]</button>
          </form>

          <!-- Existing custom locations -->
          @if (customLocations().length > 0) {
            <div>
              <p class="text-xs tracking-widest uppercase text-hud-ghost mb-2">Custom locations</p>
              <div class="divide-y divide-hud-dim text-sm">
                @for (loc of customLocations(); track loc.name) {
                  <div class="flex items-center justify-between py-1.5">
                    <div class="flex items-center gap-3">
                      <span class="text-hud-body">{{ loc.name }}</span>
                      <span class="text-xs text-hud-ghost">{{ loc.system }}</span>
                      @if (loc.refinery) {
                        <span class="text-xs text-hud-accent">[refinery]</span>
                      }
                    </div>
                    <button
                      type="button"
                      class="hud-btn-ghost text-xs px-2 py-0.5 text-hud-error hover:text-hud-body"
                      (click)="remove(loc.name)"
                      title="Remove location"
                    >
                      ×
                    </button>
                  </div>
                }
              </div>
            </div>
          } @else {
            <p class="text-xs text-hud-ghost">No custom locations added yet.</p>
          }

        </div>
      </div>
    </div>
  </div>
}
